genius:
  rate_limit_delay: 1.0
  timeout: 30                  # HTTP read timeout in seconds for Genius API calls

llm:
  provider: claude           # claude | gemini | openrouter
  model: claude-haiku-4-5-20251001
  temperature: 1.0
  max_tokens: 4096
  candidates_per_song: 5    # LLM is asked for this many distinct variants per song

phi:
  min_aggregate: 0.70        # Minimum Phi_agg score to accept a variant
  weights:
    phoneme: 0.20            # S_ph: phoneme sequence similarity
    rhyme: 0.20              # S_rh: terminal phoneme overlap
    syllable: 0.15           # S_sy: syllable count ratio
    stress: 0.15             # S_st: stress pattern alignment
    jaccard: 0.10            # S_jac: phoneme-set Jaccard similarity
    cv_pattern: 0.10         # S_cv: consonant-vowel skeleton
    stressed_vowel: 0.10     # S_vow: stressed vowel core alignment

prompts:
  apt_primary: prompts/apt_primary.txt
  apt_fallback: prompts/apt_fallback.txt
  style_description: prompts/style_description.txt

data_dir: data

# API keys should come from environment variables, not this file.
# Set: GENIUS_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, OPENROUTER_API_KEY
# You can also put them in a .env file in the repo root.
